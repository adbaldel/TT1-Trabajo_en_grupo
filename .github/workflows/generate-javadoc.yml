name: Deploy Javadoc to GitHub Pages

# 1. Publicar la documentación de la rama stable
on:
  push:
    branches:
      - stable 

# 2. Permisos estrictamente necesarios para que el bot de GitHub pueda desplegar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 3. Traer el código al servidor
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 4. Instalar Java en el servidor
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven' # Opcional: Acelera las ejecuciones cacheando dependencias de Maven

      # 5. Generar Javadoc usando Maven en lugar del comando crudo
      - name: Generar Javadoc con Maven
        run: mvn clean javadoc:javadoc

      # 6. Preparar y subir los archivos generados a GitHub Pages
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          # Maven genera por defecto el Javadoc en esta ruta
          path: 'target/reports/apidocs' 

      # 7. Desplegar
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
