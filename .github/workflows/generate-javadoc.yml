name: Deploy Javadoc to GitHub Pages

# 1. Publicar la documentación de la rama stable
on:
  push:
    branches:
      - stable 

# 2. Permisos estrictamente necesarios para que el bot de GitHub pueda desplegar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # 5. Generar Javadoc obligando a Maven a ignorar errores estrictos de formato
      - name: Generar Javadoc con Maven
        run: mvn clean javadoc:javadoc -DfailOnError=false
        # NOTA: Si tu pom.xml está dentro de una carpeta, descomenta la siguiente línea y pon el nombre:
        # working-directory: ./Trabajo_grupal

      # PASO DE DEBUG: Busca en todo el servidor dónde se creó exactamente la carpeta "apidocs"
      - name: Buscar carpeta apidocs (Debug)
        run: find . -name "apidocs" -type d

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      # 6. Subir artefacto
      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANTE: Si tu pom.xml está en una carpeta llamada "Trabajo_grupal", 
          # cambia esta ruta a 'Trabajo_grupal/target/site/apidocs'
          path: 'target/site/apidocs' 

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
