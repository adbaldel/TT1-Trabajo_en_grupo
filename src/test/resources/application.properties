# ==========================================
# CONFIGURACIÓN DEL SERVIDOR
# ==========================================
server.base_uri=http://localhost:8081/
database.persistence_unit.name=SimServerPUTest
# ==========================================
# CONFIGURACIÓN DE LA SIMULACIÓN
# ==========================================
simulation.ticks_to_run=1000
simulation.initial_occupancy=0.35
simulation.food_probability=0.2
# ==========================================
# CONFIGURACIÓN DE CRIATURAS
# ==========================================
# Estática
creature.static.names=static-test
creature.static.colors=static_color-test
creature.static.starvation_thresholds=5
# Móvil
creature.mobile.names=mobile-test
creature.mobile.colors=mobile_color-test
creature.mobile.starvation_thresholds=5
creature.mobile.move_probabilities=0.5
# Conejo estático
creature.static_rabbit.names=rabbit-test
creature.static_rabbit.colors=rabbit_color-test
creature.static_rabbit.starvation_thresholds=5
creature.static_rabbit.multiply_probabilities=0.2